<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eden</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #07080a;
  --surface: #0d0f12;
  --surface-2: #13161b;
  --border: #1e2128;
  --border-active: #2a2f38;
  --text: #e2e4e8;
  --text-dim: #6b7280;
  --text-muted: #404550;
  --cyan: #22d3ee;
  --green: #34d399;
  --red: #f87171;
  --amber: #fbbf24;
  --blue: #60a5fa;
  --purple: #a78bfa;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', system-ui, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.5;
  overflow-x: hidden;
}

/* ── Layout ── */
.app { display: flex; flex-direction: column; height: 100vh; }

.topbar {
  display: flex; align-items: center; gap: 16px;
  padding: 8px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.topbar-brand {
  font-family: var(--mono);
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 2px;
  color: var(--cyan);
}

.topbar-market {
  display: flex; gap: 4px;
}

.topbar-market button {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  padding: 4px 12px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
}

.topbar-market button.active {
  background: var(--cyan);
  color: var(--bg);
  border-color: var(--cyan);
}

.topbar-regime {
  font-family: var(--mono);
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 3px;
  font-weight: 600;
}

.regime-risk_on, .regime-neutral { background: rgba(34,211,238,0.12); color: var(--cyan); }
.regime-risk_off { background: rgba(248,113,113,0.12); color: var(--red); }

.topbar-temp {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
}

.topbar-tick {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-muted);
}

.topbar-status {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ── Tabs ── */
.tab-bar {
  display: flex; gap: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.tab-bar button {
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  padding: 8px 20px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
}

.tab-bar button.active {
  color: var(--text);
  border-bottom-color: var(--cyan);
}

.tab-bar button:hover:not(.active) {
  color: var(--text);
  background: var(--surface-2);
}

/* ── Main content ── */
.main { flex: 1; overflow-y: auto; padding: 16px; }

/* ── Cards ── */
.grid { display: grid; gap: 12px; }
.grid-2 { grid-template-columns: 1fr 1fr; }
.grid-3 { grid-template-columns: 1fr 1fr 1fr; }
.grid-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px;
}

.card:hover { border-color: var(--border-active); }

.card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}

.card-title {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-dim);
}

.card-badge {
  font-family: var(--mono);
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 3px;
  font-weight: 600;
}

/* ── Market Desk ── */
.session-headline {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 8px;
  line-height: 1.3;
}

.session-summary {
  color: var(--text-dim);
  font-size: 12px;
  line-height: 1.6;
}

.stat-row {
  display: flex; align-items: baseline; gap: 8px;
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
}

.stat-label {
  font-size: 11px;
  color: var(--text-dim);
  min-width: 80px;
}

.stat-value {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
}

.focus-symbol {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 3px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.15s;
}

.focus-symbol:hover {
  border-color: var(--cyan);
  color: var(--cyan);
}

/* ── Recommendation cards ── */
.rec-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px;
  cursor: pointer;
  transition: all 0.15s;
}

.rec-card:hover { border-color: var(--cyan); transform: translateY(-1px); }

.rec-symbol {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 700;
}

.rec-action {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 3px;
  text-transform: uppercase;
}

.action-enter, .action-add { background: rgba(34,211,238,0.12); color: var(--cyan); }
.action-monitor, .action-watch { background: rgba(251,191,36,0.12); color: var(--amber); }
.action-review { background: rgba(167,139,250,0.12); color: var(--purple); }
.action-trim, .action-exit { background: rgba(248,113,113,0.12); color: var(--red); }
.action-ignore { background: rgba(107,114,128,0.12); color: var(--text-dim); }

.rec-why {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 6px;
  line-height: 1.4;
}

.rec-meta {
  display: flex; gap: 12px;
  margin-top: 8px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-muted);
}

/* ── Case Board ── */
.case-row {
  display: grid;
  grid-template-columns: 100px 80px 1fr 100px 80px 80px;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  cursor: pointer;
  transition: background 0.1s;
}

.case-row:hover { background: var(--surface-2); }

.case-symbol { font-family: var(--mono); font-weight: 600; }

.stage-badge {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 3px;
  text-align: center;
}

.stage-suggested { background: rgba(96,165,250,0.12); color: var(--blue); }
.stage-confirmed { background: rgba(34,211,238,0.12); color: var(--cyan); }
.stage-executed, .stage-monitoring { background: rgba(52,211,153,0.12); color: var(--green); }
.stage-review { background: rgba(167,139,250,0.12); color: var(--purple); }

/* ── Symbol Investigator ── */
.symbol-detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.evidence-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}

.evidence-weight {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  min-width: 40px;
  text-align: right;
}

.positive { color: var(--green); }
.negative { color: var(--red); }

/* ── Loading / Error ── */
.loading {
  display: flex; align-items: center; justify-content: center;
  height: 200px;
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 12px;
}

.empty-state {
  text-align: center;
  padding: 40px;
  color: var(--text-muted);
  font-size: 13px;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-active); }

/* ── Responsive ── */
@media (max-width: 900px) {
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  .case-row { grid-template-columns: 80px 70px 1fr 80px; }
  .symbol-detail-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="topbar">
    <span class="topbar-brand">EDEN</span>
    <div class="topbar-market">
      <button class="active" onclick="switchMarket('hk')">HK</button>
      <button onclick="switchMarket('us')">US</button>
    </div>
    <span id="regime" class="topbar-regime"></span>
    <span id="temperature" class="topbar-temp"></span>
    <span id="tick-info" class="topbar-tick"></span>
    <span id="status" class="topbar-status"></span>
  </div>

  <div class="tab-bar">
    <button class="active" onclick="switchTab('desk')">Market Desk</button>
    <button onclick="switchTab('cases')">Case Board</button>
    <button onclick="switchTab('symbol')">Symbol Investigator</button>
  </div>

  <div class="main" id="content">
    <div class="loading">Connecting to Eden...</div>
  </div>
</div>

<script>
// ── State ──
let currentMarket = 'hk';
let currentTab = 'desk';
let currentSymbol = null;
let snapshot = null;
let apiKey = localStorage.getItem('eden_api_key') || '';

// ── API ──
const API_BASE = window.location.origin + '/api';

async function fetchSnapshot() {
  try {
    const headers = {};
    if (apiKey) headers['x-api-key'] = apiKey;
    const res = await fetch(`${API_BASE}/ontology/${currentMarket}/operational-snapshot`, { headers });
    if (res.status === 401) {
      apiKey = prompt('Eden API Key:');
      if (apiKey) {
        localStorage.setItem('eden_api_key', apiKey);
        return fetchSnapshot();
      }
      return;
    }
    snapshot = await res.json();
    render();
  } catch (e) {
    document.getElementById('content').innerHTML =
      `<div class="loading">Connection failed: ${e.message}<br><br>Make sure eden-api is running</div>`;
  }
}

// ── Render dispatcher ──
function render() {
  if (!snapshot) return;
  renderTopbar();
  switch (currentTab) {
    case 'desk': renderMarketDesk(); break;
    case 'cases': renderCaseBoard(); break;
    case 'symbol': renderSymbolInvestigator(); break;
  }
}

// ── Topbar ──
function renderTopbar() {
  const ms = snapshot.market_session;
  const regime = ms.market_regime;
  const el = document.getElementById('regime');
  el.textContent = regime.bias;
  el.className = `topbar-regime regime-${regime.bias}`;

  document.getElementById('tick-info').textContent =
    `tick ${snapshot.source_tick} · ${new Date(ms.observed_at).toLocaleTimeString()}`;

  // Market buttons
  document.querySelectorAll('.topbar-market button').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase() === currentMarket);
  });

  // Tab buttons
  document.querySelectorAll('.tab-bar button').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase().includes(currentTab === 'desk' ? 'market' : currentTab === 'cases' ? 'case' : 'symbol'));
  });
}

// ── Market Desk ──
function renderMarketDesk() {
  const ms = snapshot.market_session;
  const regime = ms.market_regime;
  const recs = snapshot.recommendations || [];
  const events = snapshot.macro_events || [];

  let html = `
    <div class="grid grid-3" style="margin-bottom: 16px">
      <div class="card" style="grid-column: span 2">
        <div class="card-header">
          <span class="card-title">Session</span>
          ${ms.should_speak ? '<span class="card-badge" style="background:rgba(34,211,238,0.15);color:var(--cyan)">ACTIVE</span>' : '<span class="card-badge" style="background:rgba(107,114,128,0.1);color:var(--text-muted)">QUIET</span>'}
        </div>
        <div class="session-headline">${ms.wake_headline || 'No active signal'}</div>
        <div class="session-summary">${(ms.wake_summary || []).join(' · ') || ''}</div>
        ${ms.focus_symbols.length ? `<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">${ms.focus_symbols.map(s => `<span class="focus-symbol" onclick="investigateSymbol('${s}')">${s}</span>`).join('')}</div>` : ''}
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title">Market</span></div>
        <div class="stat-row"><span class="stat-label">Regime</span><span class="stat-value">${regime.bias}</span></div>
        <div class="stat-row"><span class="stat-label">Confidence</span><span class="stat-value">${fmt(regime.confidence)}</span></div>
        <div class="stat-row"><span class="stat-label">Breadth ↑</span><span class="stat-value">${fmt(regime.breadth_up)}</span></div>
        <div class="stat-row"><span class="stat-label">Breadth ↓</span><span class="stat-value">${fmt(regime.breadth_down)}</span></div>
        <div class="stat-row"><span class="stat-label">Avg Return</span><span class="stat-value ${numClass(regime.average_return)}">${fmtPct(regime.average_return)}</span></div>
        <div class="stat-row"><span class="stat-label">Threads</span><span class="stat-value">${ms.active_thread_count}</span></div>
        <div class="stat-row"><span class="stat-label">Priority</span><span class="stat-value">${fmt(ms.priority)}</span></div>
      </div>
    </div>

    ${events.length ? `
    <div class="card" style="margin-bottom:16px">
      <div class="card-header"><span class="card-title">Macro Events</span><span class="card-badge" style="background:rgba(251,191,36,0.12);color:var(--amber)">${events.length}</span></div>
      ${events.map(e => `
        <div class="stat-row">
          <span class="stat-label" style="min-width:120px">${e.event.headline || e.id.replace('macro_event:','')}</span>
          <span class="stat-value" style="font-size:11px;color:var(--text-dim)">${(e.event.impact?.affected_sectors || []).join(', ')}</span>
        </div>
      `).join('')}
    </div>` : ''}

    <div class="card-header" style="margin-bottom:8px"><span class="card-title">Recommendations</span><span class="card-badge" style="background:rgba(34,211,238,0.12);color:var(--cyan)">${recs.length}</span></div>
    <div class="grid grid-3">
      ${recs.map(r => renderRecCard(r)).join('')}
    </div>
  `;

  document.getElementById('content').innerHTML = html;
}

function renderRecCard(r) {
  const rec = r.recommendation;
  const action = rec.best_action || 'watch';
  const actionClass = action.includes('enter') || action.includes('add') ? 'enter' :
                      action.includes('monitor') || action.includes('watch') ? 'monitor' :
                      action.includes('review') ? 'review' :
                      action.includes('trim') || action.includes('exit') ? 'trim' : 'ignore';
  return `
    <div class="rec-card" onclick="investigateSymbol('${rec.symbol}')">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span class="rec-symbol">${rec.symbol}</span>
        <span class="rec-action action-${actionClass}">${action}</span>
      </div>
      <div class="rec-why">${rec.why || ''}</div>
      <div class="rec-meta">
        ${rec.primary_lens ? `<span>lens: ${rec.primary_lens}</span>` : ''}
        ${rec.expected_net_alpha ? `<span class="${numClass(rec.expected_net_alpha)}">alpha: ${fmtPct(rec.expected_net_alpha)}</span>` : ''}
        ${rec.fragility ? `<span>fragility: ${fmt(rec.fragility)}</span>` : ''}
      </div>
      ${rec.watch_next?.length ? `<div style="margin-top:6px;font-size:11px;color:var(--text-muted)">Watch: ${rec.watch_next.slice(0,2).join(' · ')}</div>` : ''}
    </div>
  `;
}

// ── Case Board ──
function renderCaseBoard() {
  const cases = snapshot.cases || [];
  if (!cases.length) {
    document.getElementById('content').innerHTML = '<div class="empty-state">No active cases</div>';
    return;
  }

  // Group by workflow stage
  const stages = ['suggested', 'confirmed', 'executed', 'monitoring', 'review'];
  const grouped = {};
  stages.forEach(s => grouped[s] = []);
  cases.forEach(c => {
    const stage = c.workflow_state || 'suggested';
    if (!grouped[stage]) grouped[stage] = [];
    grouped[stage].push(c);
  });

  let html = `
    <div class="card">
      <div class="card-header">
        <span class="card-title">Cases</span>
        <span class="card-badge" style="background:rgba(34,211,238,0.12);color:var(--cyan)">${cases.length}</span>
      </div>
      <div class="case-row" style="font-size:10px;color:var(--text-muted);font-family:var(--mono);cursor:default;border-bottom:2px solid var(--border)">
        <span>SYMBOL</span><span>STAGE</span><span>TITLE</span><span>ACTION</span><span>CONF</span><span>POLICY</span>
      </div>
      ${cases.sort((a,b) => (b.confidence||0) - (a.confidence||0)).map(c => `
        <div class="case-row" onclick="investigateSymbol('${c.symbol}')">
          <span class="case-symbol">${c.symbol}</span>
          <span class="stage-badge stage-${c.workflow_state || 'suggested'}">${c.workflow_state || 'suggest'}</span>
          <span style="color:var(--text-dim);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.title}</span>
          <span class="rec-action action-${c.action?.includes('enter') ? 'enter' : c.action?.includes('monitor') ? 'monitor' : c.action?.includes('review') ? 'review' : 'ignore'}" style="font-size:9px">${c.action || '-'}</span>
          <span style="font-family:var(--mono);font-size:11px">${fmt(c.confidence)}</span>
          <span style="font-family:var(--mono);font-size:10px;color:var(--text-muted)">${c.execution_policy || '-'}</span>
        </div>
      `).join('')}
    </div>
  `;

  document.getElementById('content').innerHTML = html;
}

// ── Symbol Investigator ──
function renderSymbolInvestigator() {
  if (!currentSymbol) {
    // Show symbol grid
    const symbols = snapshot.symbols || [];
    if (!symbols.length) {
      document.getElementById('content').innerHTML = '<div class="empty-state">No symbol data</div>';
      return;
    }

    let html = `
      <div class="card-header" style="margin-bottom:12px">
        <span class="card-title">Select Symbol</span>
      </div>
      <div class="grid grid-4">
        ${symbols.map(s => `
          <div class="focus-symbol" onclick="investigateSymbol('${s.symbol}')" style="padding:8px 12px;justify-content:space-between;width:100%">
            <span>${s.symbol}</span>
            <span style="color:var(--text-muted);font-size:10px">${s.sector || ''}</span>
          </div>
        `).join('')}
      </div>
    `;
    document.getElementById('content').innerHTML = html;
    return;
  }

  const sym = snapshot.symbols?.find(s => s.symbol === currentSymbol);
  const cases = snapshot.cases?.filter(c => c.symbol === currentSymbol) || [];
  const recs = snapshot.recommendations?.filter(r => r.recommendation.symbol === currentSymbol) || [];
  const backward = snapshot.sidecars?.backward_investigations?.find(b =>
    b.leaf_scope?.Symbol === currentSymbol || b.leaf_label?.includes(currentSymbol)
  );

  if (!sym) {
    document.getElementById('content').innerHTML = `
      <div class="empty-state">
        <div style="margin-bottom:12px">${currentSymbol} not in current snapshot</div>
        <button onclick="currentSymbol=null;render()" style="font-family:var(--mono);padding:6px 16px;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:4px;cursor:pointer">Back</button>
      </div>`;
    return;
  }

  const state = sym.state || {};

  let html = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <button onclick="currentSymbol=null;render()" style="font-family:var(--mono);font-size:11px;padding:4px 10px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-dim);border-radius:4px;cursor:pointer">← Back</button>
      <span style="font-family:var(--mono);font-size:20px;font-weight:700">${currentSymbol}</span>
      <span style="font-size:12px;color:var(--text-dim)">${sym.sector || ''}</span>
    </div>

    <div class="symbol-detail-grid">
      <div class="card">
        <div class="card-header"><span class="card-title">Signal</span></div>
        ${state.signal ? `
          <div class="stat-row"><span class="stat-label">Composite</span><span class="stat-value ${numClass(state.signal.composite)}">${fmtSigned(state.signal.composite)}</span></div>
          <div class="stat-row"><span class="stat-label">Capital Flow</span><span class="stat-value ${numClass(state.signal.capital_flow_direction)}">${fmtSigned(state.signal.capital_flow_direction)}</span></div>
          <div class="stat-row"><span class="stat-label">Momentum</span><span class="stat-value ${numClass(state.signal.price_momentum)}">${fmtSigned(state.signal.price_momentum)}</span></div>
          ${state.signal.mark_price ? `<div class="stat-row"><span class="stat-label">Price</span><span class="stat-value">${state.signal.mark_price}</span></div>` : ''}
        ` : '<div class="empty-state">No signal data</div>'}
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title">Structure</span></div>
        ${state.structure ? `
          <div class="stat-row"><span class="stat-label">Status</span><span class="stat-value">${state.structure.status || '-'}</span></div>
          <div class="stat-row"><span class="stat-label">Streak</span><span class="stat-value">${state.structure.status_streak || 0}</span></div>
          <div class="stat-row"><span class="stat-label">Degradation</span><span class="stat-value">${fmt(state.structure.composite_degradation)}</span></div>
          <div class="stat-row"><span class="stat-label">Inst. Retention</span><span class="stat-value">${fmt(state.structure.institution_retention)}</span></div>
        ` : '<div class="empty-state">No structure</div>'}
      </div>

      ${state.depth ? `
      <div class="card">
        <div class="card-header"><span class="card-title">Depth</span></div>
        <div class="stat-row"><span class="stat-label">Imbalance</span><span class="stat-value ${numClass(state.depth.imbalance)}">${fmtSigned(state.depth.imbalance)}</span></div>
        <div class="stat-row"><span class="stat-label">Bid Top3</span><span class="stat-value">${fmtPct(state.depth.bid_top3_ratio)}</span></div>
        <div class="stat-row"><span class="stat-label">Ask Top3</span><span class="stat-value">${fmtPct(state.depth.ask_top3_ratio)}</span></div>
        <div class="stat-row"><span class="stat-label">Spread</span><span class="stat-value">${state.depth.spread || '-'}</span></div>
      </div>` : ''}

      ${cases.length ? `
      <div class="card">
        <div class="card-header"><span class="card-title">Cases</span></div>
        ${cases.map(c => `
          <div class="stat-row">
            <span class="stat-label" style="min-width:60px"><span class="stage-badge stage-${c.workflow_state}">${c.workflow_state}</span></span>
            <span class="stat-value" style="font-size:11px">${c.title}</span>
          </div>
        `).join('')}
      </div>` : ''}
    </div>

    ${backward ? `
    <div class="card" style="margin-top:12px">
      <div class="card-header"><span class="card-title">Backward Investigation</span></div>
      <div class="stat-row"><span class="stat-label">Conclusion</span><span class="stat-value">${backward.leaf_label || '-'}</span></div>
      ${backward.leading_cause ? `
        <div class="stat-row"><span class="stat-label">Leading Cause</span><span class="stat-value">${backward.leading_cause.explanation || '-'}</span></div>
        <div class="stat-row"><span class="stat-label">Conviction</span><span class="stat-value">${fmt(backward.leading_cause.net_conviction)}</span></div>
        <div class="stat-row"><span class="stat-label">Contest</span><span class="stat-value">${backward.contest_state || '-'}</span></div>
        ${backward.leading_cause.falsifier ? `<div class="stat-row"><span class="stat-label">Falsifier</span><span class="stat-value" style="color:var(--red)">${backward.leading_cause.falsifier}</span></div>` : ''}

        ${backward.leading_cause.supporting_evidence?.length ? `
        <div style="margin-top:10px">
          <div class="card-title" style="margin-bottom:6px">EVIDENCE</div>
          ${backward.leading_cause.supporting_evidence.map(e => `
            <div class="evidence-item">
              <span class="evidence-weight ${numClass(e.weight)}">${fmtSigned(e.weight)}</span>
              <span style="color:var(--text-dim)">[${e.channel}]</span>
              <span>${e.statement}</span>
            </div>
          `).join('')}
        </div>` : ''}
      ` : ''}
    </div>` : ''}

    ${recs.length ? `
    <div style="margin-top:12px">
      <div class="card-header" style="margin-bottom:8px"><span class="card-title">Recommendations</span></div>
      <div class="grid grid-2">
        ${recs.map(r => renderRecCard(r)).join('')}
      </div>
    </div>` : ''}
  `;

  document.getElementById('content').innerHTML = html;
}

// ── Helpers ──
function fmt(v) { return v != null ? Number(v).toFixed(3) : '-'; }
function fmtPct(v) { return v != null ? (Number(v) * 100).toFixed(2) + '%' : '-'; }
function fmtSigned(v) { return v != null ? (Number(v) >= 0 ? '+' : '') + Number(v).toFixed(4) : '-'; }
function numClass(v) { return Number(v) > 0 ? 'positive' : Number(v) < 0 ? 'negative' : ''; }

// ── Navigation ──
function switchMarket(m) {
  currentMarket = m;
  currentSymbol = null;
  fetchSnapshot();
}

function switchTab(t) {
  currentTab = t;
  currentSymbol = null;
  render();
}

function investigateSymbol(sym) {
  currentSymbol = sym;
  currentTab = 'symbol';
  render();
}

// ── Init ──
fetchSnapshot();
setInterval(fetchSnapshot, 5000);
</script>
</body>
</html>
