<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eden — 市場決策系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0A0A0A; --bg-dark: #080808; --bg-card: #111111; --bg-elevated: #141414;
  --border: #1A1A1A; --border-light: #2f2f2f;
  --text: #FFFFFF; --text-secondary: #8a8a8a; --text-muted: #6a6a6a;
  --accent: #FF8400; --green: #B6FFCE; --green-bg: #0F1410;
  --red: #FF5C33; --red-bg: #140A0A; --orange: #FF8400;
  --font-mono: 'JetBrains Mono', monospace; --font-display: 'Space Grotesk', sans-serif;
}
body { background: var(--bg); color: var(--text); font-family: var(--font-mono); font-size: 12px; height: 100vh; overflow: hidden; }
a { color: inherit; text-decoration: none; }

/* Top Bar */
.topbar { display: flex; align-items: center; height: 40px; padding: 0 20px; background: var(--bg-dark); border-bottom: 1px solid var(--border); gap: 16px; flex-shrink: 0; }
.topbar-logo { font-family: var(--font-display); font-weight: 700; font-size: 16px; letter-spacing: 2px; color: var(--accent); }
.topbar-tabs { display: flex; gap: 4px; }
.topbar-tab { padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600; color: var(--text-muted); }
.topbar-tab.active { background: var(--accent); color: #111; }
.topbar-tick { color: var(--text-muted); font-size: 10px; }
.topbar-spacer { flex: 1; }
.topbar-stat { font-size: 10px; color: var(--text-secondary); }
.topbar-stat span { font-weight: 700; }
.topbar-stat .up { color: var(--green); }
.topbar-stat .down { color: var(--red); }
.topbar-stat .warn { color: var(--orange); }
.topbar-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

/* Layout */
.layout { display: flex; height: calc(100vh - 40px); }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.sidebar { width: 300px; border-left: 1px solid var(--border); background: var(--bg-dark); overflow-y: auto; flex-shrink: 0; }

/* Main Content */
.section-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px 8px; }
.section-title { font-size: 13px; font-weight: 700; color: var(--text); }
.section-count { font-size: 10px; color: var(--text-muted); }

/* Signal Cards */
.signal-list { flex: 1; overflow-y: auto; padding: 0 12px 12px; }
.signal-card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 8px; padding: 16px 18px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.15s; }
.signal-card:hover { border-color: #3f3f3f; }
.signal-card.new { border-color: rgba(182,255,206,0.3); }
.signal-card.accepted { background: var(--green-bg); border-color: var(--border); }
.signal-card.rejected { background: var(--red-bg); border-color: var(--border); }

.signal-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.signal-sym { font-family: var(--font-display); font-size: 15px; font-weight: 700; }
.signal-sym-row { display: flex; align-items: center; gap: 8px; }
.signal-badge { font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 999px; }
.signal-badge.enter { background: var(--accent); color: #111; }
.signal-badge.review { background: transparent; border: 1px solid rgba(255,132,0,0.4); color: var(--orange); }
.signal-badge.accepted { background: #222924; color: var(--green); }
.signal-badge.rejected { background: #24100B; color: var(--red); }
.signal-confidence { font-family: var(--font-display); font-size: 14px; font-weight: 700; }

.signal-desc { font-size: 11px; color: var(--text); line-height: 1.7; margin-bottom: 10px; }

/* Expanded Signal Detail */
.signal-detail { display: none; border-top: 1px solid var(--border); padding-top: 12px; margin-top: 4px; }
.signal-card.expanded .signal-detail { display: block; }

.signal-prices { display: flex; gap: 20px; margin-bottom: 10px; }
.signal-price-item { display: flex; align-items: center; gap: 6px; }
.signal-price-label { font-size: 9px; color: var(--text-muted); }
.signal-price-value { font-family: var(--font-display); font-size: 14px; font-weight: 700; }
.signal-price-value.entry { color: var(--green); }
.signal-price-value.stop { color: var(--red); }
.signal-price-value.risk { color: var(--orange); font-family: var(--font-mono); font-size: 11px; }

.signal-factors { display: flex; gap: 16px; margin-bottom: 10px; }
.signal-factor-col { flex: 1; }
.signal-factor-label { font-size: 9px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.5px; margin-bottom: 6px; }
.signal-factor-row { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 3px; }
.signal-factor-name { color: var(--text); }
.signal-factor-value { font-family: var(--font-display); font-weight: 700; }
.signal-factor-value.positive { color: var(--green); }
.signal-factor-value.negative { color: var(--red); }
.signal-factor-value.warn { color: var(--orange); }
.signal-factor-value.muted { color: var(--text-muted); }

.signal-reason { font-size: 9px; color: var(--text-muted); line-height: 1.4; margin-bottom: 10px; }
.signal-warn { font-size: 9px; color: var(--orange); background: #1A1A0A; padding: 6px 10px; border-radius: 4px; line-height: 1.4; margin-bottom: 10px; }

.signal-actions { display: flex; gap: 8px; }
.signal-btn { flex: 1; padding: 8px 0; border: none; border-radius: 6px; font-family: var(--font-mono); font-size: 11px; font-weight: 700; cursor: pointer; text-align: center; }
.signal-btn.accept { background: var(--accent); color: #111; }
.signal-btn.reject { background: transparent; border: 1px solid rgba(255,92,51,0.4); color: var(--red); }
.signal-btn.watch { background: transparent; border: 1px solid var(--border-light); color: var(--text-muted); }
.signal-btn:hover { opacity: 0.85; }

/* Sidebar sections */
.sidebar-section { border-bottom: 1px solid var(--border); padding: 12px 16px; }
.sidebar-section-title { font-size: 10px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.5px; margin-bottom: 8px; }
.anomaly-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; font-size: 11px; }
.anomaly-sym { font-weight: 600; color: var(--text-secondary); }
.anomaly-change.down { color: var(--red); font-weight: 600; }
.anomaly-change.up { color: var(--green); font-weight: 600; }
.anomaly-note { font-size: 9px; color: var(--text-muted); max-width: 100px; text-align: right; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

.sector-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; font-size: 11px; }
.sector-name { color: var(--text-secondary); }
.sector-arrow { color: var(--red); }
.sector-arrow.up { color: var(--green); }

.flow-grid { display: flex; gap: 8px; }
.flow-col { flex: 1; }
.flow-header { font-size: 9px; font-weight: 700; margin-bottom: 6px; }
.flow-header.inflow { color: var(--green); }
.flow-header.outflow { color: var(--red); }
.flow-row { display: flex; justify-content: space-between; font-size: 10px; padding: 2px 0; }
.flow-sym { color: var(--text-secondary); }
.flow-pct.up { color: var(--green); }
.flow-pct.down { color: var(--red); }

/* Signal Feed at bottom */
.signal-feed { border-top: 1px solid var(--border); background: var(--bg-dark); flex-shrink: 0; }
.signal-feed-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 20px; }
.signal-feed-title { font-size: 11px; font-weight: 700; }
.signal-feed-tabs { display: flex; gap: 8px; font-size: 10px; color: var(--text-muted); }
.signal-feed-tabs span { cursor: pointer; }
.signal-feed-tabs span.active { color: var(--text); }
.signal-feed-body { padding: 8px 20px; height: 80px; overflow-y: auto; font-size: 10px; color: var(--text-muted); }
.feed-line { padding: 2px 0; display: flex; gap: 8px; }
.feed-time { color: var(--text-muted); flex-shrink: 0; }
.feed-content { color: var(--text-secondary); }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2f2f2f; border-radius: 2px; }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-logo">EDEN</div>
  <div class="topbar-tabs">
    <div class="topbar-tab active" onclick="switchMarket('hk')">港股</div>
    <div class="topbar-tab" onclick="switchMarket('us')">美股</div>
  </div>
  <div class="topbar-tick" id="tickNumber">#--</div>
  <div class="topbar-spacer"></div>
  <div class="topbar-stat">壓力 <span class="warn" id="stressValue">--</span></div>
  <div class="topbar-stat">共振 <span id="syncValue">--</span></div>
  <div class="topbar-stat">命中 <span class="up" id="hitRate">--</span></div>
  <div class="topbar-stat">盈虧 <span id="pnlValue">--</span></div>
  <div class="topbar-dot" id="statusDot"></div>
</div>

<!-- Layout -->
<div class="layout">
  <!-- Main -->
  <div class="main">
    <div class="section-header">
      <div class="section-title">行動建議</div>
      <div class="section-count" id="signalCount">-- 進場</div>
    </div>
    <div class="signal-list" id="signalList">
      <div style="padding: 40px; text-align: center; color: var(--text-muted);">
        連接中 ...
      </div>
    </div>

    <!-- Signal Feed -->
    <div class="signal-feed">
      <div class="signal-feed-header">
        <div class="signal-feed-title">信號情報</div>
        <div class="signal-feed-tabs">
          <span class="active">全部</span>
          <span>分鐘</span>
          <span>重要</span>
        </div>
      </div>
      <div class="signal-feed-body" id="feedBody">
        <div style="color: var(--text-muted);">等待信號變動 ...</div>
      </div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <!-- Anomaly Watch -->
    <div class="sidebar-section">
      <div class="sidebar-section-title">異動監察</div>
      <div id="anomalyList">
        <div style="color: var(--text-muted); font-size: 10px;">載入中 ...</div>
      </div>
    </div>

    <!-- Sectors -->
    <div class="sidebar-section">
      <div class="sidebar-section-title">板塊</div>
      <div id="sectorList">
        <div style="color: var(--text-muted); font-size: 10px;">載入中 ...</div>
      </div>
    </div>

    <!-- Events -->
    <div class="sidebar-section">
      <div class="sidebar-section-title">事件</div>
      <div id="eventList">
        <div style="color: var(--text-muted); font-size: 10px;">等待盤中 ...</div>
      </div>
    </div>

    <!-- Capital Flow -->
    <div class="sidebar-section">
      <div class="sidebar-section-title">資金動向</div>
      <div id="flowSection">
        <div class="flow-grid">
          <div class="flow-col">
            <div class="flow-header inflow">流入 ▲</div>
            <div id="inflowList"></div>
          </div>
          <div class="flow-col">
            <div class="flow-header outflow">流出 ▼</div>
            <div id="outflowList"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="sidebar-section" style="border-bottom: none;">
      <div id="statsLine" style="font-size: 9px; color: var(--text-muted);"></div>
    </div>
  </div>
</div>

<script>
const API_BASE = '';
const API_KEY = localStorage.getItem('eden_api_key') || '';
let currentMarket = 'hk';

// ── Helpers ──
function headers() {
  const h = { 'Content-Type': 'application/json' };
  if (API_KEY) h['x-api-key'] = API_KEY;
  return h;
}

function switchMarket(m) {
  currentMarket = m;
  document.querySelectorAll('.topbar-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.topbar-tab[onclick="switchMarket('${m}')"]`).classList.add('active');
  connectStream();
}

// ── Signal Card Rendering ──
function renderSignalCard(c, isNew) {
  const dir = parseFloat(c.confidence_gap || 0) >= 0 ? 'up' : 'down';
  const dirLabel = dir === 'up' ? '▲ 看多' : '▼ 看空';
  const dirColor = dir === 'up' ? 'var(--green)' : 'var(--red)';
  const action = c.recommended_action || c.action || 'enter';
  const badgeClass = action === 'enter' ? 'enter' : 'review';
  const badgeText = action === 'enter' ? '進場' : '審核';
  const conf = parseFloat(c.confidence || 0).toFixed(1) + '%';
  const mechLabel = c.primary_driver || c.family_label || '--';

  // Build description from mechanism
  const desc = c.why_now || c.entry_rationale || `系統偵測到可疑信號，建議關注。`;

  // Factors
  let factorsHtml = '';
  if (c.reasoning_profile && c.reasoning_profile.predicates) {
    const preds = c.reasoning_profile.predicates.slice(0, 3);
    factorsHtml = preds.map(p =>
      `<div class="signal-factor-row"><span class="signal-factor-name">${p.label}</span><span class="signal-factor-value positive">${parseFloat(p.score).toFixed(2)}</span></div>`
    ).join('');
  }

  // Counterfactuals
  let cfHtml = '';
  if (c.reasoning_profile && c.reasoning_profile.primary_mechanism && c.reasoning_profile.primary_mechanism.counterfactuals) {
    cfHtml = c.reasoning_profile.primary_mechanism.counterfactuals.map(cf => {
      const color = cf.remains_viable ? (cf.remains_primary ? 'muted' : 'warn') : 'negative';
      const status = cf.remains_viable ? (cf.remains_primary ? '仍為主導' : '降級') : '崩塌';
      return `<div class="signal-factor-row"><span style="color:${color === 'negative' ? 'var(--red)' : color === 'warn' ? 'var(--orange)' : 'var(--text-muted)'}">拿掉「${cf.factor_label}」→ ${status} ${cf.score_delta.toFixed(2)}</span></div>`;
    }).join('');
  }

  // Invalidation
  let warnHtml = '';
  if (c.reasoning_profile && c.reasoning_profile.primary_mechanism && c.reasoning_profile.primary_mechanism.invalidation) {
    const rules = c.reasoning_profile.primary_mechanism.invalidation.slice(0, 2);
    if (rules.length > 0) {
      warnHtml = `<div class="signal-warn">\u26A0 ${rules.join(' ')}</div>`;
    }
  }

  return `
    <div class="signal-card ${isNew ? 'new' : ''}" onclick="toggleCard(this)" data-setup-id="${c.setup_id || c.case_id || ''}">
      <div class="signal-top">
        <div class="signal-sym-row">
          <span class="signal-sym">${c.symbol}</span>
          <span class="signal-badge ${badgeClass}">${badgeText}</span>
        </div>
        <span class="signal-confidence" style="color:${dirColor}">${conf}</span>
      </div>
      <div class="signal-desc">${c.symbol} ${desc}</div>
      <div class="signal-detail">
        <div class="signal-prices">
          <div class="signal-price-item"><span class="signal-price-label">入場</span><span class="signal-price-value entry">--</span></div>
          <div class="signal-price-item"><span class="signal-price-label">止損</span><span class="signal-price-value stop">--</span></div>
          <div class="signal-price-item"><span class="signal-price-label">風險</span><span class="signal-price-value risk">--</span></div>
        </div>
        <div class="signal-factors">
          <div class="signal-factor-col">
            <div class="signal-factor-label">關鍵因子</div>
            ${factorsHtml || '<div style="color:var(--text-muted);font-size:10px;">--</div>'}
          </div>
          <div class="signal-factor-col">
            <div class="signal-factor-label">什麼會改變結論</div>
            ${cfHtml || '<div style="color:var(--text-muted);font-size:10px;">--</div>'}
          </div>
        </div>
        ${warnHtml}
        <div class="signal-reason">理由：${mechLabel}</div>
        <div class="signal-actions">
          <button class="signal-btn accept" onclick="event.stopPropagation();doAction('${c.setup_id}','confirm')">進場</button>
          <button class="signal-btn watch" onclick="event.stopPropagation();doAction('${c.setup_id}','monitor')">觀望</button>
          <button class="signal-btn reject" onclick="event.stopPropagation();doAction('${c.setup_id}','review')">回絕</button>
        </div>
      </div>
    </div>
  `;
}

function toggleCard(el) {
  el.classList.toggle('expanded');
}

// ── Sidebar Rendering ──
function renderAnomalies(signals) {
  if (!signals || signals.length === 0) {
    document.getElementById('anomalyList').innerHTML = '<div style="color:var(--text-muted);font-size:10px;">暫無異動</div>';
    return;
  }
  const sorted = [...signals].sort((a, b) => Math.abs(parseFloat(b.price_momentum || 0)) - Math.abs(parseFloat(a.price_momentum || 0)));
  document.getElementById('anomalyList').innerHTML = sorted.slice(0, 10).map(s => {
    const mom = parseFloat(s.price_momentum || 0);
    const pct = (mom * 100).toFixed(1) + '%';
    const cls = mom < 0 ? 'down' : 'up';
    return `<div class="anomaly-row"><span class="anomaly-sym">${s.symbol}</span><span class="anomaly-change ${cls}">${pct}</span></div>`;
  }).join('');
}

function renderFlows(signals) {
  if (!signals || signals.length === 0) return;
  const sorted = [...signals].sort((a, b) => parseFloat(b.capital_flow_direction || 0) - parseFloat(a.capital_flow_direction || 0));
  const inflows = sorted.filter(s => parseFloat(s.capital_flow_direction || 0) > 0).slice(0, 5);
  const outflows = sorted.filter(s => parseFloat(s.capital_flow_direction || 0) < 0).slice(0, 5).reverse();

  document.getElementById('inflowList').innerHTML = inflows.map(s => {
    const pct = (parseFloat(s.capital_flow_direction) * 100).toFixed(1) + '%';
    return `<div class="flow-row"><span class="flow-sym">${s.symbol}</span><span class="flow-pct up">+${pct}</span></div>`;
  }).join('') || '<div style="font-size:10px;color:var(--text-muted);">--</div>';

  document.getElementById('outflowList').innerHTML = outflows.map(s => {
    const pct = (parseFloat(s.capital_flow_direction) * 100).toFixed(1) + '%';
    return `<div class="flow-row"><span class="flow-sym">${s.symbol}</span><span class="flow-pct down">${pct}</span></div>`;
  }).join('') || '<div style="font-size:10px;color:var(--text-muted);">--</div>';
}

function renderSectors(signals) {
  if (!signals || signals.length === 0) return;
  const sectors = {};
  signals.forEach(s => {
    const sec = s.sector || 'other';
    if (!sectors[sec]) sectors[sec] = [];
    sectors[sec].push(parseFloat(s.composite || 0));
  });
  const list = Object.entries(sectors).map(([name, vals]) => {
    const avg = vals.reduce((a, b) => a + b, 0) / vals.length;
    return { name, avg };
  }).sort((a, b) => b.avg - a.avg);

  document.getElementById('sectorList').innerHTML = list.map(s => {
    const cls = s.avg >= 0 ? 'up' : '';
    const arrow = s.avg >= 0 ? '▲' : '▼';
    return `<div class="sector-row"><span class="sector-name">${s.name}</span><span class="sector-arrow ${cls}">${arrow}</span></div>`;
  }).join('');
}

// ── Top Bar Stats ──
function updateTopBar(data) {
  const stress = data.stress;
  if (stress) {
    document.getElementById('stressValue').textContent = parseFloat(stress.composite_stress || 0).toFixed(1) + '%';
  }
  if (data.scorecard && data.scorecard.length > 0) {
    const sc = data.scorecard[0];
    document.getElementById('hitRate').textContent = parseFloat(sc.hit_rate || 0).toFixed(1) + '%';
  }
  if (data.tick_number) {
    document.getElementById('tickNumber').textContent = '#' + data.tick_number;
  }
  if (data.market_regime) {
    const regime = typeof data.market_regime === 'string' ? data.market_regime : data.market_regime.bias;
    // Update stress color based on regime
    const stressEl = document.getElementById('stressValue');
    if (regime && regime.includes('risk_off')) {
      stressEl.className = 'down';
    } else {
      stressEl.className = 'warn';
    }
  }
}

// ── Feed ──
function addFeedLine(text) {
  const body = document.getElementById('feedBody');
  const now = new Date();
  const time = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
  const line = document.createElement('div');
  line.className = 'feed-line';
  line.innerHTML = `<span class="feed-time">${time}</span><span class="feed-content">${text}</span>`;
  body.prepend(line);
  // Keep max 50 lines
  while (body.children.length > 50) body.removeChild(body.lastChild);
}

// ── Actions ──
async function doAction(setupId, action) {
  try {
    const res = await fetch(`${API_BASE}/api/cases/${currentMarket}/${setupId}/transition`, {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({ target_state: action })
    });
    if (res.ok) {
      addFeedLine(`${setupId} → ${action}`);
      // Remove new styling
      const card = document.querySelector(`[data-setup-id="${setupId}"]`);
      if (card) {
        card.classList.remove('new', 'expanded');
        if (action === 'confirm') card.classList.add('accepted');
        if (action === 'review') card.classList.add('rejected');
      }
    }
  } catch (e) {
    addFeedLine(`操作失敗: ${e.message}`);
  }
}

// ── SSE Stream ──
let eventSource = null;

function connectStream() {
  if (eventSource) eventSource.close();

  const url = `${API_BASE}/api/stream/${currentMarket}/cases`;
  addFeedLine(`連接 ${currentMarket.toUpperCase()} 信號流 ...`);

  eventSource = new EventSource(url);
  eventSource.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      handleCaseData(data);
    } catch (err) {
      console.error('Parse error:', err);
    }
  };
  eventSource.onerror = () => {
    addFeedLine('信號流斷開，嘗試重連 ...');
    setTimeout(connectStream, 5000);
  };

  // Also fetch live snapshot for sidebar
  fetchLiveSnapshot();
}

function handleCaseData(data) {
  if (!data || !data.cases) return;

  const cases = data.cases;
  const enterCases = cases.filter(c => (c.recommended_action || c.action) === 'enter');
  document.getElementById('signalCount').textContent = `${enterCases.length} 進場`;

  const html = cases.slice(0, 20).map((c, i) => renderSignalCard(c, i < 3)).join('');
  document.getElementById('signalList').innerHTML = html || '<div style="padding:40px;text-align:center;color:var(--text-muted);">暫無信號</div>';

  addFeedLine(`收到 ${cases.length} 個案例`);
}

async function fetchLiveSnapshot() {
  try {
    const endpoint = currentMarket === 'us' ? '/api/us/live' : '/api/live';
    const res = await fetch(`${API_BASE}${endpoint}`, { headers: headers() });
    if (!res.ok) return;
    const data = await res.json();
    updateTopBar(data);
    renderAnomalies(data.top_signals);
    renderFlows(data.top_signals);
    renderSectors(data.top_signals);

    const total = (data.top_signals || []).length;
    document.getElementById('statsLine').textContent =
      `圖譜：${total}隻股票`;
  } catch (e) {
    console.error('Snapshot fetch error:', e);
  }
}

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  connectStream();
  // Refresh sidebar every 30s
  setInterval(fetchLiveSnapshot, 30000);
});
</script>
</body>
